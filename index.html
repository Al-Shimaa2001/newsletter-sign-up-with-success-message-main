<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>newsletter-sign-up-with-success-massage</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="./assets/images/favicon-32x32.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <main class="main">
      <section>
        <div class="aside">
          <picture>
            <source
              media="(max-width: 575px)"
              srcset="./assets/images/illustration-sign-up-mobile.svg"
            />
            <source
              media="(max-width: 991px)"
              srcset="./assets/images/illustration-sign-up-tablet.svg"
            />
            <img
              class="illustration"
              src="./assets/images/illustration-sign-up-desktop.svg"
              alt="illustration"
            />
          </picture>
        </div>
        <div class="content">
          <h1>Stay updated!</h1>
          <p>Join 60,000+ product managers receiving monthly updates on:</p>
          <ul>
            <li>Product discovery and building what matters</li>
            <li>Measuring to ensure updates are a success</li>
            <li>And much more!</li>
          </ul>
          <form>
            <label for="mail"> Email address </label>
            <span class="error"> valid email required </span>
            <input
              type="email"
              name="mail"
              id="mail"
              required
              placeholder="email@company.com "
            />

            <button class="submit" href="#" type="submit">
              Subscribe to monthly newsletter
            </button>
            <form/>

  </div>
      </section>
    </main>
    <footer>Challenge by Frontend Mentor. Coded by AL-shimaa gamal.</footer>
    <script src="./main.js"></script>
  </body>
</html>
